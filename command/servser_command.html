<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>서버 명령어 - RPG & 스킬 헤일 서버</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://305like.github.io/tf2-rpg-wiki/web_2/motd2.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    body {
      margin: 0;
      font-family: "HY견고딕", "Malgun Gothic", sans-serif;
      overflow-y: auto;
      min-height: 100vh;
      position: relative;
    }

    .container {
      position: relative;
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px 50px 20px;
      z-index: 10;
    }

    .main-panel {
      background: rgba(20, 20, 20, 0.85);
      border: 3px solid rgba(255, 215, 0, 0.9);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      position: relative;
      backdrop-filter: blur(3px);
    }

    .main-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, 
        transparent, 
        #FFD700, 
        #FFA500, 
        #FFD700, 
        transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .command-container {
      background: rgba(40, 40, 40, 0.7);
      border: 3px solid rgba(255, 215, 0, 0.8);
      border-radius: 12px;
      padding: 20px 25px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .command-container:hover {
      background: rgba(60, 60, 60, 0.8);
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }

    .command-code {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #FFD700;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 20px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      min-width: 100px;
      text-align: center;
      flex-shrink: 0;
    }

    .command-description {
      font-size: 18px;
      color: #FFF;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 1);
      line-height: 1.5;
    }

    .section-title {
      font-size: 24px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      margin: 30px 0 20px 0;
      padding-left: 10px;
      border-left: 5px solid #FFD700;
    }

    .back-button {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #FFD700;
      border-radius: 10px;
      padding: 12px 30px;
      color: #FFD700;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      transition: all 0.3s ease;
      margin: 0 auto;
      display: block;
      width: fit-content;
      margin-top: 30px;
    }

    .back-button:hover {
      background: rgba(255, 215, 0, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>

  <div class="container">
    <div class="main-panel">
      <div style="position: relative; margin-bottom: 30px;">
        <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%);">
          <a href="https://305like.github.io/tf2-rpg-wiki/web_2/command/command.html" class="back-button" style="margin: 0; display: inline-block; width: auto;">⬅ 명령어 메뉴로</a>
        </div>
        <div class="title" style="margin-bottom: 0; text-align: center;">💬 서버 명령어</div>
      </div>

      <div class="section-title">🎮 일반 명령어</div>

      <!-- !tp -->
      <div class="command-container">
        <div class="command-code">!tp</div>
        <div class="command-description">3인칭을 활성화 합니다</div>
      </div>

      <!-- !fp -->
      <div class="command-container">
        <div class="command-code">!fp</div>
        <div class="command-description">3인칭을 비활성화 합니다</div>
      </div>

      <!-- !st -->
      <div class="command-container">
        <div class="command-code">!st</div>
        <div class="command-description">레벨 및 스탯 모드 페이지를 엽니다</div>
      </div>

      <!-- !ff2 -->
      <div class="command-container">
        <div class="command-code">!ff2</div>
        <div class="command-description">프리크 포트리스 모드 페이지를 엽니다</div>
      </div>

      <div class="section-title">🔧 엔지니어 전용</div>

      <!-- !son -->
      <div class="command-container">
        <div class="command-code">!son</div>
        <div class="command-description">엔지니어가 센트리를 조종할수 있습니다</div>
      </div>

      <!-- !soff -->
      <div class="command-container">
        <div class="command-code">!soff</div>
        <div class="command-description">엔지니어가 센트리 조종을 그만둡니다</div>
      </div>

      <!-- !base -->
      <div class="command-container">
        <div class="command-code">!base</div>
        <div class="command-description">엔지니어가 탱크 건설메뉴를 엽니다</div>
      </div>


      <!-- !dr -->
      <div class="command-container">
        <div class="command-code">!dr</div>
        <div class="command-description">로켓 디스펜서를 활성화 합니다</div>
      </div>

      <a href="https://305like.github.io/tf2-rpg-wiki/web_2/command/command.html" class="back-button">⬅ 명령어 메뉴로 돌아가기</a>
    </div>
  </div>
</body>
</html>
