<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>세이 사운드 - RPG & 스킬 헤일 서버</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("http://trade.santasrv.com/web_2/motd2.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    body {
      margin: 0;
      font-family: "HY견고딕", "Malgun Gothic", sans-serif;
      overflow-y: auto;
      min-height: 100vh;
      position: relative;
    }

    .container {
      position: relative;
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px 50px 20px;
      z-index: 10;
    }

    .main-panel {
      background: rgba(20, 20, 20, 0.85);
      border: 3px solid rgba(255, 215, 0, 0.9);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      position: relative;
      backdrop-filter: blur(3px);
    }

    .main-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, 
        transparent, 
        #FFD700, 
        #FFA500, 
        #FFD700, 
        transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .coming-soon {
      font-size: 32px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin: 80px 0;
      letter-spacing: 2px;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 30px rgba(255, 215, 0, 1); }
    }

    .back-button {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #FFD700;
      border-radius: 10px;
      padding: 12px 30px;
      color: #FFD700;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      transition: all 0.3s ease;
      margin: 0 auto;
      display: block;
      width: fit-content;
      margin-top: 30px;
    }

    .back-button:hover {
      background: rgba(255, 215, 0, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>

  <div class="container">
    <div class="main-panel">
      <div style="position: relative; margin-bottom: 30px;">
        <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%);">
          <a href="http://trade.santasrv.com/web_2/command/command.html" class="back-button" style="margin: 0; display: inline-block; width: auto;">⬅ 명령어 메뉴로</a>
        </div>
        <div class="title" style="margin-bottom: 0; text-align: center;">🔊 세이 사운드</div>
      </div>

      <div class="coming-soon">⚠️ 준비중입니다 ⚠️</div>

      <a href="http://trade.santasrv.com/web_2/command/command.html" class="back-button">⬅ 명령어 메뉴로 돌아가기</a>
    </div>
  </div>
</body>
</html>
