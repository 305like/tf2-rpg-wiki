<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>명령어 - RPG & 스킬 헤일 서버</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("http://trade.santasrv.com/web_2/motd2.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    body {
      margin: 0;
      font-family: "HY견고딕", "Malgun Gothic", sans-serif;
      overflow-y: auto;
      min-height: 100vh;
      position: relative;
    }

    .container {
      position: relative;
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
      z-index: 10;
    }

    .main-panel {
      background: rgba(20, 20, 20, 0.85);
      border: 3px solid rgba(255, 215, 0, 0.9);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      position: relative;
      backdrop-filter: blur(3px);
    }

    .main-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, 
        transparent, 
        #FFD700, 
        #FFA500, 
        #FFD700, 
        transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 18px;
      color: #FFF;
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
    }

    .command-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      margin-bottom: 40px;
    }

    .command-item {
      background: rgba(40, 40, 40, 0.7);
      border: 3px solid rgba(255, 215, 0, 0.6);
      border-radius: 15px;
      padding: 40px 30px;
      text-align: center;
      text-decoration: none;
      color: #FFF;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-height: 220px;
    }

    .command-item::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .command-item:hover::before {
      width: 500px;
      height: 500px;
    }

    .command-item:hover {
      transform: translateY(-10px);
      border-color: #FFD700;
      box-shadow: 
        0 10px 30px rgba(255, 215, 0, 0.6),
        inset 0 0 20px rgba(255, 215, 0, 0.1);
    }

    .command-icon {
      font-size: 80px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
      transition: all 0.3s ease;
    }

    .command-item:hover .command-icon {
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1));
      transform: scale(1.15);
    }

    .command-name {
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      position: relative;
      z-index: 1;
      margin-top: 10px;
    }

    .command-description {
      font-size: 14px;
      color: #CCC;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 1);
      position: relative;
      z-index: 1;
    }

    .back-button {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #FFD700;
      border-radius: 10px;
      padding: 12px 30px;
      color: #FFD700;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      transition: all 0.3s ease;
      margin: 0 auto;
      display: block;
      width: fit-content;
    }

    .back-button:hover {
      background: rgba(255, 215, 0, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
    }

    @media (max-width: 768px) {
      .command-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>

  <div class="container">
    <div class="main-panel">
      <div class="title">💬 명령어</div>
      <div class="subtitle">카테고리를 선택하세요</div>

      <div class="command-grid">
        <!-- 서버 명령어 -->
        <a href="http://trade.santasrv.com/web_2/command/servser_command.html" class="command-item">
          <div class="command-icon">💬</div>
          <div class="command-name">서버 명령어</div>
          <div class="command-description">서버 내 사용 가능한 모든 명령어</div>
        </a>

        <!-- 세이 사운드 -->
        <a href="http://trade.santasrv.com/web_2/command/say_sound.html" class="command-item">
          <div class="command-icon">🔊</div>
          <div class="command-name">세이 사운드</div>
          <div class="command-description">채팅으로 재생 가능한 사운드 목록</div>
        </a>
      </div>

      <a href="http://trade.santasrv.com/web_2/index.html" class="back-button">⬅ 메인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
