<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>스킬 목록 - RPG & 스킬 헤일 서버</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("http://trade.santasrv.com/web_2/motd2.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    body {
      margin: 0;
      font-family: "HY견고딕", "Malgun Gothic", sans-serif;
      overflow-y: auto;
      min-height: 100vh;
      position: relative;
    }

    .container {
      position: relative;
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
      z-index: 10;
    }

    .main-panel {
      background: rgba(20, 20, 20, 0.85);
      border: 3px solid rgba(255, 215, 0, 0.9);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      position: relative;
      backdrop-filter: blur(3px);
    }

    .main-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, 
        transparent, 
        #FFD700, 
        #FFA500, 
        #FFD700, 
        transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 18px;
      color: #FFF;
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
    }

    .class-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .class-item {
      background: rgba(40, 40, 40, 0.7);
      border: 3px solid rgba(255, 215, 0, 0.6);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      text-decoration: none;
      color: #FFF;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .class-item::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .class-item:hover::before {
      width: 400px;
      height: 400px;
    }

    .class-item:hover {
      transform: translateY(-10px);
      border-color: #FFD700;
      box-shadow: 
        0 10px 30px rgba(255, 215, 0, 0.6),
        inset 0 0 20px rgba(255, 215, 0, 0.1);
    }

    .class-icon {
      width: 80px;
      height: 80px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
      transition: all 0.3s ease;
    }

    .class-item:hover .class-icon {
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1));
      transform: scale(1.1);
    }

    .class-name {
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      position: relative;
      z-index: 1;
    }

    .back-button {
      display: inline-block;
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #FFD700;
      border-radius: 10px;
      padding: 12px 30px;
      color: #FFD700;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      transition: all 0.3s ease;
      margin: 0 auto;
      display: block;
      width: fit-content;
    }

    .back-button:hover {
      background: rgba(255, 215, 0, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>

  <div class="container">
    <div class="main-panel">
      <div class="title">🎯 스킬 목록</div>
      <div class="subtitle">클래스를 선택하세요</div>

      <div class="class-grid">
        <!-- Scout -->
        <a href="scout_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/0/0a/Scout_emblem_RED.png" 
               alt="Scout" class="class-icon">
          <div class="class-name">SCOUT</div>
        </a>

        <!-- Soldier -->
        <a href="soldier_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/d/de/Soldier_emblem_RED.png" 
               alt="Soldier" class="class-icon">
          <div class="class-name">SOLDIER</div>
        </a>

        <!-- Pyro -->
        <a href="pyro_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/b/b1/Pyro_emblem_RED.png" 
               alt="Pyro" class="class-icon">
          <div class="class-name">PYRO</div>
        </a>

        <!-- Demoman -->
        <a href="demoman_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/8/8c/Demoman_emblem_RED.png" 
               alt="Demoman" class="class-icon">
          <div class="class-name">DEMOMAN</div>
        </a>

        <!-- Heavy -->
        <a href="heavy_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/4/48/Heavy_emblem_RED.png" 
               alt="Heavy" class="class-icon">
          <div class="class-name">HEAVY</div>
        </a>

        <!-- Engineer -->
        <a href="engineer_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/c/cf/Engineer_emblem_RED.png" 
               alt="Engineer" class="class-icon">
          <div class="class-name">ENGINEER</div>
        </a>

        <!-- Medic -->
        <a href="medic_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/1/11/Medic_emblem_RED.png" 
               alt="Medic" class="class-icon">
          <div class="class-name">MEDIC</div>
        </a>

        <!-- Sniper -->
        <a href="sniper_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/f/fb/Sniper_emblem_RED.png" 
               alt="Sniper" class="class-icon">
          <div class="class-name">SNIPER</div>
        </a>

        <!-- Spy -->
        <a href="spy_skill.html" class="class-item">
          <img src="https://wiki.teamfortress.com/w/images/9/95/Spy_emblem_RED.png" 
               alt="Spy" class="class-icon">
          <div class="class-name">SPY</div>
        </a>
      </div>

      <a href="http://trade.santasrv.com/web_2/index.html" class="back-button">⬅ 메인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
