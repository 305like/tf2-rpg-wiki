<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>헤일 능력치 - RPG & 스킬 헤일 서버</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://305like.github.io/tf2-rpg-wiki/web_2/motd2.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    body {
      margin: 0;
      font-family: "HY견고딕", "Malgun Gothic", sans-serif;
      overflow-y: auto;
      min-height: 100vh;
      position: relative;
    }

    .container {
      position: relative;
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px 50px 20px;
      z-index: 10;
    }

    .main-panel {
      background: rgba(20, 20, 20, 0.85);
      border: 3px solid rgba(255, 100, 100, 0.9);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 100, 100, 0.4),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
      padding: 60px 40px;
      position: relative;
      backdrop-filter: blur(3px);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .main-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, 
        transparent, 
        #FF6464, 
        #FF3333, 
        #FF6464, 
        transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .title {
      font-size: 48px;
      font-weight: bold;
      color: #FF6464;
      text-align: center;
      text-shadow: 
        3px 3px 6px rgba(0, 0, 0, 1),
        0 0 30px rgba(255, 100, 100, 0.8);
      margin-bottom: 40px;
      letter-spacing: 3px;
    }

    .class-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 60px;
    }

    .class-header img {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 20px rgba(255, 100, 100, 0.6));
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .class-header .class-name {
      font-size: 42px;
      font-weight: bold;
      color: #FFF;
      text-shadow: 
        3px 3px 6px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 100, 100, 0.5);
    }

    .coming-soon {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      text-align: center;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 20px rgba(255, 215, 0, 0.8);
      margin: 40px 0;
      letter-spacing: 2px;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 1),
        0 0 30px rgba(255, 215, 0, 1); }
    }

    .back-button {
      display: inline-block;
      background: rgba(255, 100, 100, 0.2);
      border: 2px solid #FF6464;
      border-radius: 10px;
      padding: 12px 30px;
      color: #FF6464;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
      transition: all 0.3s ease;
      margin-top: 40px;
    }

    .back-button:hover {
      background: rgba(255, 100, 100, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 100, 100, 0.5);
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>

  <div class="container">
    <div class="main-panel">
      <div class="title">🎓 능력치</div>

      <div class="class-header">
        <img src="https://wiki.teamfortress.com/w/images/thumb/b/bb/Backpack_Saxton.png/135px-Backpack_Saxton.png" alt="Hale">
        <div class="class-name">HALE</div>
      </div>

      <div class="coming-soon">⚠️ 준비중입니다 ⚠️</div>

      <a href="https://305like.github.io/tf2-rpg-wiki/web_2/stats/stats.html" class="back-button">⬅ 클래스 선택으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
